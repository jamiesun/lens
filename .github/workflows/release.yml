name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release, e.g. v0.2.0. Required for manual runs.'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          if [ -z "$tag" ]; then
            echo "::error::Could not resolve a release tag."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          tag="${{ steps.release.outputs.tag }}"
          version="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag $tag does not match package.json version ($version). Bump package.json and re-tag."
            exit 1
          fi

      - name: Type check
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Extension E2E tests
        run: npm run test:e2e

      - name: Build release package
        run: npm run zip

      - name: Locate zip artifact
        id: artifact
        run: |
          path=$(find .output -maxdepth 1 -name '*-chrome.zip' -print -quit)
          if [ -z "$path" ]; then
            echo "::error::No packaged *-chrome.zip found in .output/."
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          asset="${{ steps.artifact.outputs.path }}"
          if gh release view "$tag" --json id >/dev/null 2>&1; then
            # Re-running after a fix: refresh the asset instead of failing.
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" \
              --title "Lens $tag" \
              --generate-notes
          fi
